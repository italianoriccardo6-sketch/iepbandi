<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diagnostico Incentivi · Italiano &amp; Partners</title>
<meta name="description" content="Scopri quali incentivi alle imprese può intercettare la tua azienda, oggi. Strumento gratuito di Italiano & Partners." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
<style>
  :root{
    --navy:#0A1730;--navy-2:#0E1E3A;--ink:#06101F;
    --paper:#F7F4EC;--mist:#A9B4C9;--mist-2:#6E7C97;
    --gold:#E0B450;--gold-deep:#C2912E;--gold-soft:#F0D58A;
    --cyan:#5BE0C8;--green:#46d6a0;
    --line:rgba(255,255,255,.10);--glass-line:rgba(224,180,80,.22);
    --card:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;background:var(--ink);}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;}
  .display{font-family:'Fraunces','Georgia',serif;}
  #bg{position:fixed;inset:0;z-index:0;background:radial-gradient(60% 50% at 80% 6%,rgba(224,180,80,.14),transparent 60%),radial-gradient(55% 55% at 8% 12%,rgba(38,72,140,.45),transparent 60%),radial-gradient(80% 60% at 50% 116%,rgba(20,40,84,.6),transparent 60%),linear-gradient(180deg,#0A1730,#06101F);}
  canvas#stars{position:fixed;inset:0;z-index:1;pointer-events:none;}
  .wrap{position:relative;z-index:3;max-width:1140px;margin:0 auto;padding:0 28px 64px;}
  .panel{max-width:660px;margin:0 auto;}
  @media(max-width:560px){.wrap{padding:0 18px 56px;}}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:15px 0;margin-bottom:8px;border-bottom:1px solid var(--line);backdrop-filter:blur(12px);background:rgba(6,16,31,.72);}
  .brandlink{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;}
  .mark{width:36px;height:36px;border-radius:50%;position:relative;flex:0 0 auto;background:radial-gradient(circle at 35% 30%,#16294a,#0A1730);box-shadow:0 0 0 1px rgba(224,180,80,.3),0 0 20px rgba(224,180,80,.22);}
  .mark::after{content:"";position:absolute;inset:11px;border-radius:50%;border:1.5px solid var(--gold);box-shadow:0 0 10px var(--gold);}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--paper);}
  .brand small{display:block;font-family:'Inter',sans-serif;font-weight:600;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .topnav{margin-left:auto;display:flex;align-items:center;gap:20px;}
  .topnav .lnk{font-size:14px;color:var(--mist);cursor:pointer;font-weight:500;}
  .topnav .lnk:hover{color:var(--paper);}
  .topcta{font-size:14px;font-weight:700;padding:10px 18px;border-radius:11px;background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;cursor:pointer;border:none;box-shadow:0 10px 26px -12px rgba(224,180,80,.6);}
  .topcta:hover{box-shadow:0 14px 34px -10px rgba(224,180,80,.85);}
  .btn{font:inherit;font-size:14px;font-weight:600;padding:12px 22px;border-radius:11px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;box-shadow:0 10px 26px -12px rgba(224,180,80,.55);}
  .btn-primary:hover{box-shadow:0 14px 34px -10px rgba(224,180,80,.8);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--paper);border-color:rgba(224,180,80,.4);}
  .btn-ghost:hover{background:rgba(224,180,80,.08);border-color:var(--gold);}
  .btn-gold{background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;backdrop-filter:blur(8px);}
  .progress{display:flex;gap:6px;margin:26px 0 24px;}
  .pstep{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.12);transition:background .3s;}
  .pstep.on{background:var(--gold);}
  .steplabel{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
  .steplabel b{font-family:'Fraunces',serif;font-size:22px;color:var(--paper);font-weight:600;}
  .num{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.12em;}
  .substep{font-size:13.5px;color:var(--mist);margin:0 0 22px;}
  .field{margin-bottom:20px;}
  .field>label{display:block;font-size:13px;font-weight:600;color:var(--paper);margin-bottom:9px;}
  .hint{font-size:12px;color:var(--mist-2);font-weight:400;margin-left:6px;}
  select.in,input.in{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.14);border-radius:11px;font:inherit;font-size:14px;background:rgba(255,255,255,.05);color:var(--paper);outline:none;}
  select.in option{color:#0A1730;}
  select.in:focus,input.in:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(224,180,80,.18);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{padding:9px 14px;border:1px solid rgba(255,255,255,.14);border-radius:999px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.04);color:var(--mist);transition:all .15s;user-select:none;}
  .chip:hover{border-color:var(--gold);color:var(--paper);}
  .chip.sel{background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;border-color:transparent;font-weight:600;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:560px){.row{grid-template-columns:1fr;}}
  .consent{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--mist);margin:4px 0 0;}
  .consent input{margin-top:3px;flex:0 0 auto;}
  .consent a{color:var(--gold);}
  .actions{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px;}
  .disc{font-size:12px;color:var(--mist-2);margin-top:22px;padding-top:16px;border-top:1px solid var(--line);}
  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:22px;}
  .tab{flex:1;text-align:center;padding:11px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--mist);cursor:pointer;}
  .tab.on{background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;}
  .rhead{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:6px;}
  .rhead h2{font-family:'Fraunces',serif;font-size:28px;color:var(--paper);font-weight:600;margin:6px 0 0;}
  .subprofile{font-size:13px;color:var(--mist);margin:4px 0 4px;}
  .result{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-top:13px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;backdrop-filter:blur(8px);}
  .result.nat{border-color:var(--glass-line);box-shadow:0 0 0 1px rgba(224,180,80,.12) inset;}
  .score{width:60px;flex:0 0 auto;text-align:center;}
  .score .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mist-2);margin-top:2px;}
  .mname{font-family:'Fraunces',serif;font-size:17px;color:var(--paper);font-weight:600;margin:0;line-height:1.25;}
  .natbadge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#2a1d05;background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle;}
  .meta{font-size:12px;color:var(--mist-2);margin-top:3px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0;}
  .tag{font-size:11px;padding:4px 9px;border-radius:7px;background:rgba(224,180,80,.12);color:var(--gold-soft);border:1px solid rgba(224,180,80,.18);}
  .tag.sport{background:rgba(70,214,160,.12);color:var(--green);border-color:rgba(70,214,160,.2);}
  .facts{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--mist);margin:4px 0 10px;}
  .facts b{color:var(--paper);font-weight:600;}
  .why{font-size:12.5px;color:var(--mist);}
  .why ul{margin:0 0 0 16px;padding:0;}
  .why li{margin:2px 0;}
  .mcta{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap;}
  .link{font-size:12.5px;color:var(--gold);text-decoration:none;font-weight:600;}
  .link:hover{text-decoration:underline;}
  .more{display:block;margin:20px auto 0;}
  .lead{background:linear-gradient(160deg,rgba(224,180,80,.12),rgba(255,255,255,.02));border:1px solid var(--glass-line);color:var(--paper);border-radius:16px;padding:30px;margin-top:34px;}
  .lead h3{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin:0 0 8px;}
  .lead p{color:var(--mist);font-size:14px;margin:0 0 18px;max-width:60ch;}
  .callbox{background:rgba(255,255,255,.05);border:1px solid var(--glass-line);border-radius:12px;padding:18px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;}
  .callbox .t{font-family:'Fraunces',serif;font-size:17px;font-weight:600;}
  .callbox .s{color:var(--mist);font-size:13px;margin-top:3px;}
  .empty{text-align:center;color:var(--mist-2);padding:40px 20px;}
  .thanks{text-align:center;padding:18px 0 4px;}
  .thanks .ck{font-size:34px;color:var(--green);}
  .footer{margin-top:48px;padding-top:22px;border-top:1px solid var(--line);font-size:12.5px;color:var(--mist-2);}
  .footer b{color:var(--paper);}
  .footer details{margin-top:10px;}
  .footer summary{cursor:pointer;color:var(--gold);font-weight:600;}
  .footer .info{margin-top:10px;font-size:12px;line-height:1.6;max-width:80ch;color:var(--mist);}
  .dashhead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:14px 0 22px;}
  .dashhead h2{font-family:'Fraunces',serif;font-size:28px;color:var(--paper);font-weight:600;margin:4px 0 0;}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .kpi.warn{border-color:var(--glass-line);background:linear-gradient(160deg,rgba(224,180,80,.12),rgba(255,255,255,.02));}
  .kpi .kv{font-family:'Fraunces',serif;font-size:29px;font-weight:600;color:var(--paper);line-height:1;}
  .kpi.warn .kv{color:var(--gold-soft);}
  .kpi .kl{font-size:13px;font-weight:600;color:var(--paper);margin-top:9px;}
  .kpi .ks{font-size:12px;color:var(--mist-2);margin-top:2px;}
  .kpi.clickable{cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .05s;}
  .kpi.clickable:hover{border-color:var(--gold);box-shadow:0 14px 30px -18px rgba(224,180,80,.5);}
  .kpi.clickable:active{transform:translateY(1px);}
  .kpi .kgo{font-size:12px;font-weight:600;color:var(--gold);margin-top:11px;}
  .vfilter{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:14px 0 2px;}
  .vpill{font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:var(--mist);cursor:pointer;user-select:none;}
  .vpill:hover{border-color:var(--gold);color:var(--paper);}
  .vpill.on{background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));color:#2a1d05;border-color:transparent;}
  .dashsec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-top:16px;}
  .dstitle{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;}
  .dstitle h3{font-size:18px;color:var(--paper);margin:0;font-family:'Fraunces',serif;}
  .scadrow,.reqrow{display:flex;align-items:center;gap:14px;padding:13px 0;border-top:1px solid var(--line);}
  .scadrow:first-of-type,.reqrow:first-of-type{border-top:none;}
  .scadd{min-width:104px;}
  .scadd b{display:block;color:var(--paper);font-size:14px;}
  .scadd span{font-size:11.5px;color:var(--mist-2);}
  .scadm{flex:1;min-width:0;}
  .sname{font-weight:600;color:var(--paper);font-size:14px;}
  .stato{font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;}
  .stato.new{background:rgba(70,214,160,.14);color:var(--green);}
  .stato.work{background:rgba(224,180,80,.14);color:var(--gold-soft);}
  .stato.done{background:rgba(255,255,255,.08);color:var(--mist);}
  .profilo{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px;}
  .pcell{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:11px;padding:11px 13px;}
  .pl{font-size:11px;color:var(--mist-2);text-transform:uppercase;letter-spacing:.04em;}
  .pv{font-size:14px;color:var(--paper);font-weight:600;margin-top:3px;word-break:break-word;}
  .dashprompt{display:flex;gap:18px;align-items:center;background:linear-gradient(160deg,rgba(224,180,80,.12),rgba(255,255,255,.02));border:1px solid var(--glass-line);color:var(--paper);border-radius:16px;padding:26px;}
  .dashprompt .dpi{font-size:34px;color:var(--gold);line-height:1;}
  .dashprompt b{font-family:'Fraunces',serif;font-size:19px;}
  .dashprompt p{color:var(--mist);font-size:13.5px;margin:6px 0 14px;}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}.profilo{grid-template-columns:repeat(2,1fr);}}
  .hamb{display:none;margin-left:auto;width:42px;height:38px;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:rgba(255,255,255,.04);cursor:pointer;flex-direction:column;justify-content:center;align-items:center;gap:4px;padding:0;}
  .hamb span{display:block;width:18px;height:2px;background:var(--gold);border-radius:2px;}
  @media(max-width:720px){
    .hamb{display:flex;}
    .topnav{display:none;}
    .topnav.open{display:flex;flex-direction:column;align-items:stretch;gap:0;position:absolute;top:calc(100% + 8px);right:0;left:0;background:#0c1c36;border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 50px -20px rgba(0,0,0,.7);padding:8px;z-index:60;margin-left:0;}
    .topnav.open .lnk{padding:12px;font-size:15px;border-radius:8px;color:var(--paper);}
    .topnav.open .lnk:hover{background:rgba(255,255,255,.06);}
    .topnav.open .topcta{width:100%;margin-top:6px;text-align:center;padding:12px;font-size:15px;}
  }
  /* ===== LANDING (home) ===== */
  .l-hero{display:grid;grid-template-columns:1.08fr .92fr;gap:56px;align-items:center;padding:64px 0 56px;}
  .l-copy,.l-stage{min-width:0;}
  .l-eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:22px;}
  .l-pulse{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:lbeat 2.4s infinite;}
  @keyframes lbeat{0%{box-shadow:0 0 0 0 rgba(224,180,80,.5)}70%{box-shadow:0 0 0 11px rgba(224,180,80,0)}100%{box-shadow:0 0 0 0 rgba(224,180,80,0)}}
  .l-h1{font-weight:600;font-size:clamp(38px,5.4vw,64px);line-height:1.03;letter-spacing:-.02em;margin:0 0 22px;color:var(--paper);}
  .l-line{display:block;}
  .l-shine{background:linear-gradient(100deg,var(--gold-deep) 0%,var(--gold-soft) 35%,#fff8e6 50%,var(--gold-soft) 65%,var(--gold-deep) 100%);background-size:250% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:lsweep 5s linear infinite;}
  @keyframes lsweep{to{background-position:-250% 0}}
  .l-lede{font-size:17.5px;color:var(--mist);max-width:40ch;margin:0 0 24px;}
  .l-lede b{color:var(--paper);font-weight:600;}
  .l-welcome{font-size:13.5px;color:var(--mist);background:rgba(224,180,80,.08);border:1px solid var(--glass-line);border-radius:11px;padding:10px 14px;margin:0 0 18px;}
  .l-welcome b{color:var(--paper);}
  .l-ai{margin-bottom:16px;}
  .l-aibar{display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid var(--glass-line);border-radius:16px;padding:10px 10px 10px 16px;transition:box-shadow .3s,border-color .3s;}
  .l-aibar:hover{border-color:rgba(91,224,200,.4);box-shadow:0 0 28px -6px rgba(91,224,200,.25);}
  .l-spark{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.08em;color:#0a1730;background:linear-gradient(135deg,var(--cyan),#7af0dc);padding:6px 10px;border-radius:9px;flex:none;box-shadow:0 0 16px rgba(91,224,200,.5);}
  .l-typed{flex:1;min-width:0;font-size:15.5px;color:var(--paper);white-space:normal;overflow-wrap:break-word;line-height:1.4;}
  .l-caret{display:inline-block;width:2px;height:18px;background:var(--cyan);margin-left:1px;vertical-align:middle;animation:lblink 1s steps(1) infinite;}
  @keyframes lblink{50%{opacity:0}}
  .l-go{flex:none;}
  .l-note{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:var(--mist);margin-bottom:28px;}
  .l-dot2{color:var(--cyan);}
  .l-row2{display:flex;align-items:center;gap:30px;flex-wrap:wrap;}
  .l-stat .l-n{font-family:'Fraunces',serif;font-weight:600;font-size:26px;line-height:1;color:var(--paper);}
  .l-live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:7px;vertical-align:middle;box-shadow:0 0 10px var(--green);}
  .l-stat .l-l{font-size:12.5px;color:var(--mist-2);margin-top:6px;}
  .l-seclink{color:var(--mist);font-size:14.5px;font-weight:500;border-bottom:1px solid rgba(224,180,80,.35);padding-bottom:2px;cursor:pointer;}
  .l-seclink:hover{color:var(--paper);}
  .l-stage{position:relative;perspective:1100px;}
  .l-cap{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mist-2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .l-capd{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .l-card{position:relative;background:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.03));border:1px solid var(--glass-line);border-radius:22px;padding:24px;backdrop-filter:blur(14px);box-shadow:0 40px 90px -30px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.12);transition:transform .12s ease-out;}
  .l-ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .l-match{font-size:12px;font-weight:700;color:#0a1730;background:linear-gradient(135deg,var(--gold-soft),var(--gold-deep));padding:5px 12px;border-radius:30px;}
  .l-scad{font-size:12px;font-weight:600;color:#ffd9a0;}
  .l-ch{display:flex;align-items:center;gap:16px;margin:12px 0 16px;}
  .l-ct{font-family:'Fraunces',serif;font-weight:600;font-size:18px;line-height:1.2;color:var(--paper);}
  .l-cmeta{font-size:13px;color:var(--mist-2);margin-top:4px;}
  .l-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .l-tag{font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;background:rgba(224,180,80,.12);color:var(--gold-soft);border:1px solid rgba(224,180,80,.18);}
  .l-tag.l-alt{background:rgba(255,255,255,.06);color:var(--mist);border-color:rgba(255,255,255,.08);}
  .l-cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);padding-top:16px;font-size:14px;color:var(--mist);}
  .l-val{font-family:'Fraunces',serif;color:var(--gold-soft);font-weight:600;}
  .l-sport{font-size:12px;font-weight:700;color:var(--green);}

    if(!S.dimensione||!S.regione){ alert("Seleziona dimensione e regione per continuare."); return; }
    go("s2");
  };
  var chips=document.getElementById("chips-forme");
  if(chips) chips.querySelectorAll("[data-forme]").forEach(function(c){
    c.onclick=function(){ var k=c.getAttribute("data-forme"),i=S.forme.indexOf(k);
      if(i>=0){ S.forme.splice(i,1); c.classList.remove("sel"); } else { S.forme.push(k); c.classList.add("sel"); } };
  });
  var imp=document.getElementById("f-imp");
  if(imp) imp.oninput=function(){ S.importo=+imp.value; document.getElementById("imp-lbl").textContent=euro(S.importo); };
  var kw=document.getElementById("f-kw");
  if(kw) kw.oninput=function(){ S.kw=kw.value; };
  var n2=document.getElementById("next2");
  if(n2) n2.onclick=function(){ S.limite=20; S.vista="tutti"; S.profilo={settore:S.settore,dimensione:S.dimensione,regione:S.regione,forme:S.forme.slice(),importo:S.importo,kw:S.kw}; saveProfilo(); go("results"); };
  var more=document.getElementById("more");
  if(more) more.onclick=function(){ S.limite+=20; render(); window.scrollBy(0,200); };
  var rv=document.getElementById("req-val");
  if(rv) rv.onclick=richiediValutazione;
}

function bookCall(bandoTitolo){
  var url=BOOKING_URL;
  if(bandoTitolo){ url += (url.indexOf("?")>=0?"&":"?") + "utm_content=" + encodeURIComponent((""+bandoTitolo).slice(0,80)); }
  var prefill={};
  if(S.reg){ if(S.reg.referente) prefill.name=S.reg.referente; if(S.reg.email) prefill.email=S.reg.email; }
  try{ if(window.Calendly && BOOKING_URL){ Calendly.initPopupWidget({url:url, prefill:prefill}); return; } }catch(e){}
  var w=window.open(url,"_blank");
  if(!w){ alert("Apri il calendario di prenotazione: "+url); }
}
function openBooking(){ bookCall(null); }
function richiediMisura(id, btn){
  var m=null; for(var i=0;i<MISURE.length;i++){ if(MISURE[i].id===id){ m=MISURE[i]; break; } }
  var profilo=[S.dimensione?DIM[S.dimensione]:"",S.regione,S.settore].filter(Boolean).join(" \u00b7 ");
  var body=new URLSearchParams();
  body.append("form-name","contatto-incentivi");
  body.append("impresa",S.reg.impresa||"");
  body.append("email",S.reg.email||"");
  body.append("profilo",(m?("Bando: "+m.t+" \u2014 "):"")+profilo);
  fetch("/",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body.toString()}).catch(function(){});
  saveRichiesta(m?m.id:id, m?m.t:"Richiesta valutazione");
  bookCall(m?m.t:"");
}
function go(step){
  S.menuOpen=false;
  if((step==="s1"||step==="s2"||step==="results"||step==="dashboard") && !S.registered){ S.authMode="accedi"; step="login"; }
  S.step=step; render(); window.scrollTo(0,0);
}
function val(id){ var e=document.getElementById(id); return e?e.value.trim():""; }

function accessCTA(cls){
  return S.registered
    ? '\u003cbutton class="'+cls+'" data-go="dashboard"\u003eVai alla dashboard \u2192\u003c/button\u003e'
    : '\u003cbutton class="'+cls+'" data-login="registrati"\u003eRegistrati e accedi \u2192\u003c/button\u003e';
}
function accessButtons(){
  return S.registered
    ? '\u003cbutton class="btn btn-primary" data-go="dashboard"\u003eVai alla dashboard \u2192\u003c/button\u003e \u003cbutton class="btn btn-ghost" data-go="s1"\u003eApri il diagnostico\u003c/button\u003e'
    : '\u003cbutton class="btn btn-primary" data-login="registrati"\u003eRegistrati \u2192\u003c/button\u003e \u003cbutton class="btn btn-ghost" data-login="accedi"\u003eHo gi\u00e0 un account, accedi\u003c/button\u003e';
}
function computeKPIs(P){
  var res=risultati(P), today=new Date(), s30=0,sp=0,mx=0;
  res.forEach(function(r){var m=r.m;
    if(!m.ch){ sp++; } else { var d=(new Date(m.ch)-today)/86400000; if(d>=0&&d<=30) s30++; }
    if(m.amax&&m.amax>mx) mx=m.amax;
  });
  return {pertinenti:res.length, scad30:s30, sportello:sp, maxAmax:mx, res:res};
}
function euroShort(n){ if(n>=1000000){ var v=(n/1000000); return '\u20ac '+(v%1?v.toFixed(1).replace(".",","):v.toFixed(0))+' mln'; } if(n>=1000){ return '\u20ac '+Math.round(n/1000)+' mila'; } return euro(n); }
function giorni(ch){ var d=Math.ceil((new Date(ch)-new Date())/86400000); if(d<0) return 'scaduto'; if(d===0) return 'scade oggi'; if(d===1) return 'scade domani'; return 'tra '+d+' giorni'; }
function kpi(v,l,s,cls,vista){ var ck=vista?' clickable':''; var at=vista?' data-vista="'+vista+'"':''; var go=vista?'\u003cdiv class="kgo"\u003eVedi i bandi \u2192\u003c/div\u003e':''; return '\u003cdiv class="kpi'+ck+' '+(cls||"")+'"'+at+'\u003e\u003cdiv class="kv"\u003e'+v+'\u003c/div\u003e\u003cdiv class="kl"\u003e'+l+'\u003c/div\u003e\u003cdiv class="ks"\u003e'+s+'\u003c/div\u003e'+go+'\u003c/div\u003e'; }
function vpill(v,l){ return '\u003cspan class="vpill'+(S.vista===v?' on':'')+'" data-vista="'+v+'"\u003e'+l+'\u003c/span\u003e'; }
function statoBadge(st){ st=st||'Inviata'; var c=st==='Conclusa'?'done':(st==='In valutazione'?'work':'new'); return '\u003cspan class="stato '+c+'"\u003e'+esc(st)+'\u003c/span\u003e'; }
function pcell(l,v){ return '\u003cdiv class="pcell"\u003e\u003cdiv class="pl"\u003e'+esc(l)+'\u003c/div\u003e\u003cdiv class="pv"\u003e'+esc(v||"\u2014")+'\u003c/div\u003e\u003c/div\u003e'; }
function lsKey(){ return "diag_profilo_"+(S.user&&S.user.id?S.user.id:(S.reg&&S.reg.email?S.reg.email:"anon")); }
function saveProfilo(){
  if(!S.profilo) return;
  try{ localStorage.setItem(lsKey(), JSON.stringify(S.profilo)); }catch(e){}
  if(sb&&S.user){ try{ sb.from("profili").update({ profilo:S.profilo }).eq("id",S.user.id).then(function(){},function(){}); }catch(e){} }
}
function loadLocalProfilo(){
  try{ var raw=localStorage.getItem(lsKey()); if(raw){ var p=JSON.parse(raw); if(p){ S.profilo=p; applyProfilo(p); return true; } } }catch(e){}
  return false;
}
function applyProfilo(P){ if(!P) return; S.settore=P.settore||""; S.dimensione=P.dimensione||""; S.regione=P.regione||""; S.forme=(P.forme||[]).slice(); S.importo=P.importo||150000; S.kw=P.kw||""; }
function saveRichiesta(bid,bt){
  var now=new Date().toISOString();
  S.richieste=[{bando_titolo:bt,stato:"Inviata",creato_il:now}].concat(S.richieste||[]);
  if(!sb||!S.user) return;
  try{ sb.from("richieste").insert({ user_id:S.user.id, bando_id:bid||null, bando_titolo:bt, stato:"Inviata", profilo:(S.profilo||null) }).then(function(){},function(){}); }catch(e){}
}
function loadUserData(){
  if(!sb||!S.user) return;
  try{
    sb.from("profili").select("profilo").eq("id",S.user.id).single().then(function(r){ if(r&&r.data&&r.data.profilo){ S.profilo=r.data.profilo; if(S.step!=="s1"&&S.step!=="s2") applyProfilo(S.profilo); if(S.step==="dashboard") render(); } },function(){});
    sb.from("richieste").select("bando_id,bando_titolo,stato,creato_il").eq("user_id",S.user.id).order("creato_il",{ascending:false}).then(function(r){ if(r&&r.data){ S.richieste=r.data; if(S.step==="dashboard") render(); } },function(){});
  }catch(e){}
}
var sb=null;
function initAuth(){
  try{ if(window.supabase){ sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } }catch(e){ sb=null; }
  if(!sb){ render(); return; }
  sb.auth.getSession().then(function(res){
    var session=res && res.data ? res.data.session : null;
    if(session){ onAuthed(session, false); } else { render(); }
  });
  sb.auth.onAuthStateChange(function(_e, session){ if(session && !S.registered){ onAuthed(session, true); } });
}
function onAuthed(session, justLoggedIn){
  S.user=session.user; S.registered=true; S.consenso=true;
  var md=session.user.user_metadata||{};
  S.reg={ impresa:md.impresa||S.reg.impresa||"", referente:md.referente||S.reg.referente||"", email:session.user.email||"", telefono:md.telefono||S.reg.telefono||"" };
  loadLocalProfilo();
  upsertProfilo();
  loadUserData();
  if(justLoggedIn || S.step==="login" || S.step==="checkmail" || S.step==="home"){ S.step="dashboard"; }
  render();
}
function upsertProfilo(){
  if(!sb||!S.user) return;
  try{ sb.from("profili").upsert({ id:S.user.id, email:S.reg.email, impresa:S.reg.impresa, referente:S.reg.referente, telefono:S.reg.telefono }).then(function(){},function(){}); }catch(e){}
}
function inviaLink(){
  var email=val("r-email");
  if(!email){ alert("Inserisci la tua email."); return; }
  if(S.authMode!=="accedi"){
    var impresa=val("r-impresa"), referente=val("r-ref"), tel=val("r-tel");
    var cb=document.getElementById("r-consenso"); var consenso=cb?cb.checked:false;
    if(!impresa||!referente){ alert("Compila impresa e referente."); return; }
    if(!consenso){ alert("Per registrarti \u00e8 necessario acconsentire al trattamento dei dati."); return; }
    S.reg={impresa:impresa,referente:referente,email:email,telefono:tel}; S.consenso=true;
  } else { S.reg.email=email; }
  if(!sb){ alert("Account non configurato: imposta SUPABASE_URL e SUPABASE_ANON_KEY nel file."); return; }
  var btn=document.getElementById("reg-go"); if(btn){ btn.disabled=true; btn.textContent="Invio in corso\u2026"; }
  var opts={ emailRedirectTo: window.location.href.split("#")[0].split("?")[0] };
  if(S.authMode!=="accedi"){ opts.data={ impresa:S.reg.impresa, referente:S.reg.referente, telefono:S.reg.telefono }; }
  sb.auth.signInWithOtp({ email:email, options:opts })
    .then(function(res){
      if(res && res.error){ alert("Errore nell'invio: "+res.error.message); if(btn){ btn.disabled=false; btn.textContent="Invia link di accesso \u2192"; } return; }
      S.step="checkmail"; render();
    });
}
function logout(){
  if(sb){ sb.auth.signOut().then(function(){ S.registered=false; S.user=null; S.reg={}; S.consenso=false; go("home"); }); }
  else { S.registered=false; S.user=null; S.reg={}; go("home"); }
}

function richiediValutazione(){
  var profilo=[S.dimensione?DIM[S.dimensione]:"",S.regione,S.settore,S.kw?("kw:"+S.kw):""].filter(Boolean).join(" \u00b7 ");
  var body=new URLSearchParams();
  body.append("form-name","contatto-incentivi");
  body.append("impresa",S.reg.impresa||""); body.append("email",S.reg.email||""); body.append("profilo",profilo);
  fetch("/",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body.toString()}).catch(function(){});
  saveRichiesta("", "Valutazione del profilo");
  bookCall(null);
}

  var lead=document.getElementById("lead");
  if(lead) lead.innerHTML='<div class="thanks"><div class="ck">✓</div><h3 class="display">Richiesta ricevuta</h3><p style="margin:0 auto">Lo studio ti ricontatta a breve con una prima valutazione. Grazie.</p></div>';
}

/* === animazioni home (Tappa 1) === */
function initStars(){
  var c=document.getElementById("stars"); if(!c||c.getAttribute("data-on")) return;
  c.setAttribute("data-on","1");
  var x=c.getContext("2d"),w,h,pts,mouse={x:-999,y:-999};
  function size(){ w=c.width=innerWidth; h=c.height=innerHeight; build(); }
  function build(){ var n=Math.min(105,Math.floor(w*h/17000)); pts=[]; for(var i=0;i<n;i++)pts.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.5+.4}); }
  addEventListener("resize",size);
  addEventListener("mousemove",function(e){ mouse.x=e.clientX; mouse.y=e.clientY; });
  addEventListener("mouseout",function(){ mouse.x=-999; mouse.y=-999; });
  function loop(){ x.clearRect(0,0,w,h);
    for(var i=0;i<pts.length;i++){ var p=pts[i]; p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
      var dm=Math.hypot(p.x-mouse.x,p.y-mouse.y),glow=dm<150?1-dm/150:0;
      x.beginPath(); x.arc(p.x,p.y,p.r+glow*1.3,0,6.283); x.fillStyle="rgba(224,180,80,"+(.32+glow*.5)+")"; x.fill();
      for(var j=i+1;j<pts.length;j++){ var q=pts[j],d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<115){ x.beginPath(); x.moveTo(p.x,p.y); x.lineTo(q.x,q.y); x.strokeStyle="rgba(150,170,210,"+(.11*(1-d/115))+")"; x.lineWidth=1; x.stroke(); } }
      if(dm<150){ x.beginPath(); x.moveTo(p.x,p.y); x.lineTo(mouse.x,mouse.y); x.strokeStyle="rgba(91,224,200,"+(.28*glow)+")"; x.lineWidth=1; x.stroke(); } }
    requestAnimationFrame(loop); }
  size(); loop();
}
function lType(el,phrases){
  if(!el) return; var pi=0,ci=0,del=false;
  (function tick(){ if(!document.body.contains(el)) return;
    var s=phrases[pi]; el.textContent=s.slice(0,ci);
    if(!del){ ci++; if(ci>s.length){ del=true; setTimeout(tick,1500); return; } }
    else{ ci--; if(ci<0){ del=false; pi=(pi+1)%phrases.length; ci=0; } }
    setTimeout(tick, del?28:52); })();
}
function lCount(el,target){
  if(!el||!target) return; var t0=null;
  function step(ts){ if(!document.body.contains(el)) return; if(!t0)t0=ts; var p=Math.min((ts-t0)/1400,1),e=1-Math.pow(1-p,3); el.textContent=Math.floor(e*target); if(p<1)requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function lDemo(){
  var d=document.getElementById("l-demo"); if(!d||typeof IntersectionObserver==="undefined") return;
  var t=document.getElementById("l-demoTxt"); if(!t) return;
  var phrase="Sono una PMI campana del turismo, voglio ristrutturare un immobile e assumere due persone."; var done=false;
  var io=new IntersectionObserver(function(en){ en.forEach(function(e){ if(e.isIntersecting&&!done){ done=true;
    var i=0; (function tt(){ if(!document.body.contains(t)) return; t.textContent=phrase.slice(0,i); i++; if(i<=phrase.length) setTimeout(tt,30); })();
    io.disconnect(); } }); },{threshold:.4});
  io.observe(d);
}
function initHome(){
  var m=document.getElementById("l-marq"); if(m && !m.getAttribute("data-dup")){ m.innerHTML+=m.innerHTML; m.setAttribute("data-dup","1"); }
  lType(document.getElementById("l-typed"),["Sono una PMI campana del turismo, voglio ristrutturare un immobile...","Startup innovativa a Milano, cerco fondo perduto per ricerca e sviluppo...","Azienda agricola in Puglia, voglio acquistare nuovi macchinari...","Impresa femminile, assumo due persone e apro un e-commerce..."]);
  lCount(document.getElementById("l-count"), MISURE.length||0);
  lDemo();
  var card=document.getElementById("l-tilt");
  if(card){ var st=card.parentElement;
    st.onmousemove=function(e){ var r=st.getBoundingClientRect(),px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5; card.style.transform="rotateY("+(px*7)+"deg) rotateX("+(-py*7)+"deg)"; };
    st.onmouseleave=function(){ card.style.transform="rotateY(0) rotateX(0)"; }; }
  var b=document.getElementById("l-magnet");
  if(b){ b.onmousemove=function(e){ var r=b.getBoundingClientRect(); b.style.transform="translate("+((e.clientX-r.left-r.width/2)*.2)+"px,"+((e.clientY-r.top-r.height/2)*.3)+"px)"; };
    b.onmouseleave=function(){ b.style.transform="translate(0,0)"; }; }
}

initStars();
fetch("misure.json?v="+Date.now()).then(function(r){return r.json();}).then(function(d){ if(Array.isArray(d)&&d.length){ MISURE=d; if(["home","s1","s2","results","dashboard"].indexOf(S.step)>=0) render(); } }).catch(function(){});
initAuth();
