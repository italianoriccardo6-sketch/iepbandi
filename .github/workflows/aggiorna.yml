name: Aggiorna bandi

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    paths:
      - "opendata-export.csv"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Prepara Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa le dipendenze
        run: pip install pandas

      - name: Aggiorna il catalogo bandi
        run: python aggiorna.py opendata-export.csv

      - name: Pubblica le modifiche (se ci sono)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add misure.json
          if git diff --cached --quiet; then
            echo "Nessuna variazione nei bandi: niente da pubblicare."
          else
            git commit -m "Aggiornamento automatico bandi ($(date -u +%Y-%m-%d))"
            git push
          fi
